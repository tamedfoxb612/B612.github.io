<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Together - Fireboy & Watergirl</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 0;
            background: #090c10; 
            color: #e6edf3; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 10px 20px; 
            background: #161b22; 
            border-bottom: 1px solid #30363d;
            height: 52px;
            flex-shrink: 0;
        }
        .header button {
            background: #21262d; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            padding: 6px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }
        .header button:hover {
            background: #30363d;
            color: #fff;
        }
        .room-badge {
            background: #1f6feb;
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .main-layout { 
            display: flex; 
            flex: 1; 
            height: calc(100vh - 52px);
            width: 100%;
            overflow: hidden;
        }
        /* Side panels for cameras */
        .side-panel {
            width: 250px;
            min-width: 200px;
            max-width: 280px;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            padding: 12px;
            border-right: 1px solid #21262d;
            gap: 12px;
        }
        .side-panel.right {
            border-right: none;
            border-left: 1px solid #21262d;
        }
        .panel-header {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
            font-weight: bold;
        }
        .camera-card { 
            background: #161b22; 
            border-radius: 10px; 
            overflow: hidden; 
            position: relative; 
            border: 1px solid #30363d;
            aspect-ratio: 4 / 3;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            background: #0d1117;
        }
        .camera-label {
            position: absolute; 
            bottom: 8px; 
            left: 8px; 
            background: rgba(13, 17, 23, 0.85); 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .controls-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .ctrl-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #e6edf3;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .ctrl-btn:hover { background: #30363d; }
        .ctrl-btn.off { background: #da3633; border-color: #f85149; }
        
        /* Chat Feed in right sidebar */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
        }
        .chat-msg {
            background: #21262d;
            padding: 6px 10px;
            border-radius: 6px;
            word-break: break-word;
        }
        .chat-msg.self {
            background: #1f6feb;
            align-self: flex-end;
        }
        .chat-msg b { font-size: 11px; color: #8b949e; display: block; margin-bottom: 2px; }
        .chat-msg.self b { color: #d2a8ff; }
        .chat-input-form {
            display: flex;
            padding: 6px;
            border-top: 1px solid #30363d;
            gap: 6px;
        }
        .chat-input-form input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }
        .chat-input-form button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Center Game Area */
        .game-area { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #090c10;
            padding: 16px;
        }
        .game-container { 
            width: 100%; 
            height: 100%;
            max-width: 1100px;
            max-height: 820px;
            border: 1px solid #30363d; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-container ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="header">
        <button id="back-btn">← Back to Love Room</button>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span>Play Together Mode</span>
            <span class="room-badge" id="room-id-display">ROOM</span>
        </div>
    </div>
    
    <div class="main-layout">
        <!-- Left Side: You (Opposite side 1) -->
        <div class="side-panel">
            <div class="panel-header">You</div>
            <div class="camera-card">
                <video id="local-video" autoplay playsinline muted></video>
                <div class="camera-label" id="local-label">You</div>
            </div>
            <div class="controls-row">
                <button class="ctrl-btn" id="mic-btn" title="Toggle Mic">🎙️</button>
                <button class="ctrl-btn" id="cam-btn" title="Toggle Camera">📷</button>
            </div>
        </div>

        <!-- Center: Game Area -->
        <div class="game-area">
            <div id="game-container" class="game-container"></div>
        </div>
        
        <!-- Right Side: Partner (Opposite side 2) & Chat -->
        <div class="side-panel right">
            <div class="panel-header">Partner</div>
            <div class="camera-card">
                <video id="remote-video" autoplay playsinline></video>
                <div class="camera-label" id="remote-label">Partner</div>
            </div>

            <!-- Chat Section -->
            <div class="panel-header" style="margin-top: 4px;">Live Chat</div>
            <div class="chat-section">
                <div class="chat-feed" id="chat-feed">
                    <div style="color: #8b949e; text-align: center; font-size: 11px; margin-top: 10px;">Play Together chat connected</div>
                </div>
                <form class="chat-input-form" id="chat-form">
                    <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off" />
                    <button type="submit">❤️</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/u-cvlassrom-y/google@main/ruffle.js"></script>
    <script src="./play.js?v=pt5"></script>
</body>
</html>
