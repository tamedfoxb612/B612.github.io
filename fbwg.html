<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireboy and Watergirl</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/AndreajnRcm4/b398dl2h74v@9a23fbb2373d743a564873251cbb57736ebc1f73/style.css">
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #game, ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game"></div>

    <script src="https://cdn.jsdelivr.net/gh/u-cvlassrom-y/google@main/ruffle.js"></script>
    <script>
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("game").appendChild(player);
        player.load("https://cdn.jsdelivr.net/gh/StarRepo444/ClassroomPlayV2@c28ef0cfdccbbfc61a42d9954f14af3115c7398a/games/flash/swf/fbwg.swf");

        // Sync local keyboard and mouse events to parent window
        ['keydown', 'keyup', 'mousedown', 'mouseup', 'mousemove'].forEach(eventType => {
            window.addEventListener(eventType, (e) => {
                if (e._isSynthetic) return;
                window.parent.postMessage({
                    type: 'local-game-input',
                    payload: {
                        eventType: e.type,
                        key: e.key,
                        code: e.code,
                        keyCode: e.keyCode,
                        clientX: e.clientX,
                        clientY: e.clientY,
                        button: e.button
                    }
                }, '*');
            }, true);
        });

        // Receive remote input from partner via parent window and dispatch synthetically
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data && data.type === 'remote-game-input' && data.payload) {
                const p = data.payload;
                let syntheticEvent;
                if (p.eventType === 'keydown' || p.eventType === 'keyup') {
                    syntheticEvent = new KeyboardEvent(p.eventType, {
                        key: p.key,
                        code: p.code,
                        keyCode: p.keyCode,
                        which: p.keyCode,
                        bubbles: true,
                        cancelable: true,
                        view: window
                    });
                } else if (p.eventType && p.eventType.startsWith('mouse')) {
                    syntheticEvent = new MouseEvent(p.eventType, {
                        clientX: p.clientX || 0,
                        clientY: p.clientY || 0,
                        button: p.button || 0,
                        buttons: p.eventType === 'mousedown' ? 1 : 0,
                        bubbles: true,
                        cancelable: true,
                        view: window
                    });
                }
                if (syntheticEvent) {
                    syntheticEvent._isSynthetic = true;
                    window.dispatchEvent(syntheticEvent);
                    document.dispatchEvent(syntheticEvent);
                    const canvas = document.querySelector('canvas') || player;
                    if (canvas) canvas.dispatchEvent(syntheticEvent);
                }
            }
        });
    </script>
</body>
</html>
